name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:

  # ── NestJS API unit tests ────────────────────────────────────────
  test-api:
    name: API — Jest (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --no-coverage --forceExit

  # ── Python AI service tests ──────────────────────────────────────
  test-ai-service:
    name: AI Service — Pytest (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          INTERNAL_API_KEY: test-key
          DATABASE_URL: postgresql://x:x@localhost/x
          DEFAULT_GEMINI_API_KEY: ""
          YOLO_MODEL_PATH: ./weights/best.pt

  # ── Next.js build check ──────────────────────────────────────────
  build-web:
    name: Web — Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── Docker Compose validation ────────────────────────────────────
  validate-compose:
    name: Docker Compose — config validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
